server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: core-business-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/patients/**, /api/v1/doctors/**, /api/v1/appointments/**, /api/v1/prescriptions/**, /api/v1/billing/**
        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/notifications/**
        - id: reporting-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/reports/**
        - id: ai-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/ai/**

